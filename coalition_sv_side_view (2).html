<style>
  @import url("https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Russo+One&display=swap");
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  :root {
    --bg: #060d06;
    --panel: #0d160d;
    --border: #1a3a1a;
    --green: #3dff3d;
    --green2: #26b326;
    --green3: #0d300d;
    --amber: #f0a500;
    --red: #e03030;
    --text: #9dc09d;
    font-family: "Share Tech Mono", monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
  }
  #game {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 600px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  #hdr {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0;
  }
  #hdr .title {
    font-family: "Russo One", sans-serif;
    font-size: 13px;
    color: var(--green);
    letter-spacing: 2px;
  }
  #hdr .meta {
    font-size: 10px;
    color: var(--green2);
    opacity: 0.8;
    display: flex;
    gap: 14px;
  }
  #phase-badge {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--green2);
    color: var(--green2);
    letter-spacing: 1px;
  }

  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #scene-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }
  canvas#scene {
    display: block;
    width: 100%;
    height: 100%;
  }

  #side {
    width: 230px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--panel);
    flex-shrink: 0;
  }
  .sec {
    border-bottom: 1px solid var(--border);
    padding: 7px 10px;
  }
  .sec-title {
    font-size: 8px;
    letter-spacing: 3px;
    color: var(--green2);
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin: 2px 0;
  }
  .stat-row .lbl {
    opacity: 0.55;
  }
  .stat-row .val {
    color: var(--green);
  }
  .stat-row .val.w {
    color: var(--amber);
  }
  .stat-row .val.e {
    color: var(--red);
  }

  #tgt-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .tcard {
    border: 1px solid var(--border);
    padding: 6px 8px;
    margin: 3px;
    cursor: pointer;
    transition: all 0.12s;
    background: var(--bg);
    border-radius: 1px;
  }
  .tcard:hover {
    border-color: var(--green2);
    background: var(--green3);
  }
  .tcard.sel {
    border-color: var(--green);
    background: var(--green3);
  }
  .tcard.done {
    opacity: 0.3;
    pointer-events: none;
    text-decoration: line-through;
  }
  .tcard-name {
    font-size: 10px;
    color: var(--green);
    margin-bottom: 2px;
  }
  .tcard-info {
    font-size: 9px;
    opacity: 0.55;
  }

  #fire-area {
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    background: #0a140a;
    flex-shrink: 0;
  }
  #bpanel {
    font-size: 10px;
    margin-bottom: 7px;
    display: none;
  }
  #bpanel.on {
    display: block;
  }
  .brow {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    border-bottom: 1px solid rgba(30, 80, 30, 0.5);
    font-size: 10px;
  }
  .brow:last-child {
    border: none;
  }
  #fire-btn {
    width: 100%;
    padding: 9px;
    background: #091509;
    border: 1px solid var(--green2);
    color: var(--green);
    font-family: "Russo One", sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.12s;
  }
  #fire-btn:hover:not(:disabled) {
    background: var(--green3);
    border-color: var(--green);
  }
  #fire-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  #fire-btn.go {
    color: #000;
    background: var(--amber);
    border-color: var(--amber);
    animation: fp 0.3s infinite;
  }
  @keyframes fp {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.6;
    }
  }

  #log {
    height: 72px;
    border-top: 1px solid var(--border);
    background: #040a04;
    padding: 4px 8px;
    overflow-y: auto;
    font-size: 9px;
    flex-shrink: 0;
  }
  .ll {
    margin: 1px 0;
    line-height: 1.4;
  }
  .ll.i {
    color: var(--green2);
  }
  .ll.w {
    color: var(--amber);
  }
  .ll.h {
    color: var(--green);
    font-weight: bold;
  }
  .ll.m {
    color: var(--red);
  }

  #victory {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0, 8, 0, 0.93);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 99;
  }
  #victory.on {
    display: flex;
  }
  #victory h2 {
    font-family: "Russo One", sans-serif;
    font-size: 26px;
    color: var(--green);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  #victory .sc {
    font-size: 44px;
    color: var(--amber);
    font-family: "Russo One", sans-serif;
  }
  #rbtn {
    padding: 9px 24px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: "Share Tech Mono", monospace;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 16px;
    text-transform: uppercase;
  }
  #rbtn:hover {
    background: var(--green3);
  }
</style>

<div id="game">
  <div id="hdr">
    <span class="title">2С35 КОАЛИЦИЯ-СВ</span>
    <div class="meta">
      <span>ВИД СБОКУ</span>
      <span>ВЕТЕР 2м/с←</span>
      <span>ВЛАЖН. 70%</span>
    </div>
    <span id="phase-badge">ВЫБОР ЦЕЛИ</span>
  </div>
  <div id="main">
    <div id="scene-wrap">
      <canvas id="scene"></canvas>
      <div id="victory">
        <h2>ЗАДАЧА ВЫПОЛНЕНА</h2>
        <div
          style="
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 12px;
            letter-spacing: 2px;
          "
        >
          ВСЕ ЦЕЛИ УНИЧТОЖЕНЫ
        </div>
        <div class="sc" id="fscore">0</div>
        <div style="font-size: 11px; opacity: 0.5; margin-top: 2px">ОЧКОВ</div>

    </div>

      <div class="sec">
        <div class="sec-title">Орудие</div>
        <div class="stat-row">
          <span class="lbl">Снарядов</span><span id="ammo" class="val">6</span>
        </div>
        <div class="stat-row">
          <span class="lbl">Статус</span
          ><span id="sts" class="val">ГОТОВО</span>
        </div>
        <div class="stat-row">
          <span class="lbl">Очки</span><span id="pts" class="val w">0</span>
        </div>

  <div id="log"></div>
</div>

<script>
  const G = 9.81,
    MV = 930 * 0.995; // muzzle velocity с учётом влажности
  const WIND = 2; // м/с влево

  // Цели: dist в метрах, moving, speed м/с
  const TARGETS_DEF = [
    {
      id: 0,
      name: "ЦЕЛЬ А — БРОНЕКОЛОННА",
      dist: 20000,
      moving: true,
      speed: 20000 / 3600,
      brief: "Подвижная · 20 км · 20 км/ч",
    },
    {
      id: 1,
      name: "ЦЕЛЬ Б — КП ПРОТИВНИКА",
      dist: 50000,
      moving: false,
      speed: 0,
      brief: "Неподвижная · 50 км",
    },
    {
      id: 2,
      name: "ЦЕЛЬ В — ЗРК ПУСКОВАЯ",
      dist: 30000,
      moving: false,
      speed: 0,
      brief: "Неподвижная · 30 км",
    },
  ];

  let targets = [],
    ammo = 6,
    score = 0,
    sel = null,
    firing = false;
  let proj = null,
    explosions = [];

  // Canvas
  const cvs = document.getElementById("scene");
  const ctx = cvs.getContext("2d");
  let W = 0,
    H = 0;

  // Сцена: пушка у левого края, цели по горизонтали
  // Мы показываем одну активную цель в фокусе
  // X: 0 = пушка (слева), dist = правый край
  // Y: 0 = небо (верх), ground = низ

  function initTargets() {
    targets = TARGETS_DEF.map((d) => ({
      ...d,
      hit: false,
      px: d.dist,
      py: 0,
      moving_offset: 0,
    }));
  }

  function resize() {
    const wrap = document.getElementById("scene-wrap");
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    cvs.width = W;
    cvs.height = H;
    draw();
  }

  // === Баллистика ===
  function launchAngle(dist) {
    const s = (dist * G) / (MV * MV);
    if (s > 1) return Math.PI / 4;
    return Math.asin(Math.min(1, s)) / 2;
  }
  function tof(dist) {
    const a = launchAngle(dist);
    return dist / (MV * Math.cos(a));
  }
  function windDrift(dist) {
    return WIND * tof(dist); // м сноса влево
  }
  function maxHeight(dist) {
    const a = launchAngle(dist);
    const vy = MV * Math.sin(a);
    return (vy * vy) / (2 * G);
  }

  // === Координаты сцены ===
  // Показываем активную цель или все если нет выбранной
  // Камера: всегда видим пушку слева и выбранную цель справа
  function getCamera() {
    const t = sel || targets.find((x) => !x.hit) || targets[0];
    const dist = t ? t.dist : 30000;
    // Горизонт: dist*1.12 = ширина сцены в метрах
    const sceneW = dist * 1.15;
    const sceneH = sceneW * (H / W) * 0.9;
    return { sceneW, sceneH, dist };
  }

  function wx(mx, cam) {
    return (mx / cam.sceneW) * W + W * 0.06;
  }
  function wy(my, cam) {
    // my=0 → земля, my>0 → выше
    const groundY = H * 0.72;
    return groundY - (my / cam.sceneH) * (H * 0.65);
  }
  function groundY() {
    return H * 0.72;
  }

  // === DRAW ===
  function draw() {
    if (W === 0) return;
    ctx.clearRect(0, 0, W, H);
    const cam = getCamera();

    drawSky(cam);
    drawTerrain(cam);
    drawRangeMarkers(cam);
    drawTargets(cam);
    drawGun(cam);
    drawProjectile(cam);
    drawExplosions(cam);
    drawHUD(cam);
  }

  function drawSky(cam) {
    // Небо — градиент
    const g = ctx.createLinearGradient(0, 0, 0, groundY());
    g.addColorStop(0, "#010a01");
    g.addColorStop(1, "#04160a");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, groundY());

    // Звёзды
    ctx.fillStyle = "rgba(61,255,61,.25)";
    [
      [0.1, 0.1],
      [0.25, 0.05],
      [0.45, 0.08],
      [0.6, 0.03],
      [0.75, 0.12],
      [0.85, 0.06],
      [0.92, 0.09],
    ].forEach(([rx, ry]) => {
      ctx.beginPath();
      ctx.arc(rx * W, ry * H, 1, 0, Math.PI * 2);
      ctx.fill();
    });

    // Горизонт-линия
    ctx.strokeStyle = "rgba(30,90,30,.4)";
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, groundY());
    ctx.lineTo(W, groundY());
    ctx.stroke();
  }

  function drawTerrain(cam) {
    // Земля
    const gy = groundY();
    ctx.fillStyle = "#050f05";
    ctx.fillRect(0, gy, W, H - gy);

    // Полосы грунта
    ctx.strokeStyle = "rgba(20,60,20,.5)";
    ctx.lineWidth = 0.5;
    for (let i = 1; i < 4; i++) {
      ctx.beginPath();
      ctx.moveTo(0, gy + (i * (H - gy)) / 4);
      ctx.lineTo(W, gy + (i * (H - gy)) / 4);
      ctx.stroke();
    }

    // Рельеф (холмики)
    ctx.fillStyle = "rgba(10,30,10,.7)";
    [
      [0.3, gy, 60, 18],
      [0.55, gy, 80, 14],
      [0.75, gy, 50, 20],
    ].forEach(([rx, y, w, h]) => {
      ctx.beginPath();
      ctx.ellipse(rx * W, y, w, h, 0, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawRangeMarkers(cam) {
    // Вертикальные линии дальности
    [10000, 20000, 30000, 40000, 50000].forEach((d) => {
      if (d > cam.sceneW) return;
      const x = wx(d, cam);
      ctx.strokeStyle = "rgba(20,70,20,.4)";
      ctx.lineWidth = 0.5;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(x, H * 0.1);
      ctx.lineTo(x, groundY());
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(40,120,40,.5)";
      ctx.font = "8px Share Tech Mono";
      ctx.fillText(d / 1000 + "км", x + 2, groundY() - 4);
    });

    // Горизонтальные высотные метки
    [5000, 10000, 15000, 20000].forEach((h) => {
      const y = wy(h, cam);
      if (y < 10 || y > groundY() - 5) return;
      ctx.strokeStyle = "rgba(20,70,20,.2)";
      ctx.lineWidth = 0.4;
      ctx.setLineDash([2, 8]);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W * 0.08, y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(40,120,40,.4)";
      ctx.font = "7px Share Tech Mono";
      ctx.fillText(h / 1000 + "км", 2, y - 1);
    });
  }

  function drawGun(cam) {
    const gx = wx(0, cam);
    const gy = groundY();
    const a = sel ? -launchAngle(sel.dist) : -(Math.PI / 8);

    ctx.save();
    ctx.translate(gx, gy);
    // Гусеницы
    ctx.fillStyle = "#1a3a1a";
    ctx.strokeStyle = "#26b326";
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.rect(-14, -5, 28, 8);
    ctx.fill();
    ctx.stroke();
    // Корпус
    ctx.fillStyle = "#0d2a0d";
    ctx.strokeStyle = "#3dff3d";
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.rect(-10, -14, 20, 10);
    ctx.fill();
    ctx.stroke();
    // Ствол
    ctx.save();
    ctx.rotate(a);
    ctx.fillStyle = "#3dff3d";
    ctx.beginPath();
    ctx.rect(0, -2.5, 36, 5);
    ctx.fill();
    // Дульный тормоз
    ctx.fillStyle = "#26b326";
    ctx.beginPath();
    ctx.rect(32, -4, 6, 8);
    ctx.fill();
    ctx.restore();
    ctx.restore();

    // Метка
    ctx.fillStyle = "rgba(61,255,61,.6)";
    ctx.font = "8px Share Tech Mono";
    ctx.fillText("2С35", gx - 14, gy + 18);
  }

  function drawTargets(cam) {
    targets.forEach((t) => {
      const isSel = sel && sel.id === t.id;
      const tx = wx(t.px, cam);
      const ty = groundY();

      if (t.hit) {
        // Воронка
        ctx.fillStyle = "rgba(80,20,0,.7)";
        ctx.beginPath();
        ctx.ellipse(tx, ty, 18, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(180,50,0,.5)";
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.ellipse(tx, ty, 24, 7, 0, 0, Math.PI * 2);
        ctx.stroke();
        // X
        ctx.strokeStyle = "rgba(200,50,50,.6)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(tx - 8, ty - 16);
        ctx.lineTo(tx + 8, ty - 2);
        ctx.moveTo(tx + 8, ty - 16);
        ctx.lineTo(tx - 8, ty - 2);
        ctx.stroke();
        return;
      }

      // Пульсирующий круг для выбранной
      if (isSel) {
        const now = Date.now() / 1000;
        const r = 18 + Math.sin(now * 3) * 3;
        ctx.strokeStyle = "rgba(61,255,61,.4)";
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 4]);
        ctx.beginPath();
        ctx.arc(tx, ty - 10, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Силуэт техники
      drawVehicle(ctx, tx, ty, t.moving, isSel);

      // Движение — стрелка влево (к пушке)
      if (t.moving) {
        ctx.strokeStyle = "rgba(240,165,0,.6)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(tx - 32, ty - 8);
        ctx.lineTo(tx - 54, ty - 8);
        ctx.moveTo(tx - 50, ty - 12);
        ctx.lineTo(tx - 54, ty - 8);
        ctx.lineTo(tx - 50, ty - 4);
        ctx.stroke();
        ctx.fillStyle = "rgba(240,165,0,.7)";
        ctx.font = "8px Share Tech Mono";
        ctx.fillText("20км/ч", tx - 52, ty - 18);
      }

      // Дистанция
      ctx.fillStyle = isSel ? "#3dff3d" : "rgba(100,180,100,.7)";
      ctx.font = `${isSel ? "bold " : ""}9px Share Tech Mono`;
      ctx.fillText(t.name.split("—")[0].trim(), tx - 20, ty - 38);
      ctx.fillStyle = "rgba(80,160,80,.6)";
      ctx.font = "8px Share Tech Mono";
      ctx.fillText((t.dist / 1000).toFixed(0) + "км", tx - 10, ty - 28);
    });
  }

  function drawVehicle(ctx, x, y, moving, isSel) {
    const c = isSel ? "#3dff3d" : "#26b326";
    const cd = isSel ? "#0d400d" : "#0a2a0a";
    const now = Date.now() / 1000;

    if (moving) {
      // === АНИМИРОВАННЫЙ БТР — едет влево (к пушке), смотрит влево ===
      // Колёса крутятся по часовой (едем влево = верх колеса идёт вправо)
      const wheelSpeed = now * 8;

      // Гусеничная лента
      ctx.fillStyle = cd;
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.rect(x - 26, y - 8, 52, 8);
      ctx.fill();
      ctx.stroke();

      // Бегущие звенья — смещаются вправо (едем влево)
      const trackOffset = (now * 30) % 8;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x - 26, y - 8, 52, 8);
      ctx.clip();
      ctx.strokeStyle = isSel ? "rgba(61,255,61,.5)" : "rgba(38,179,38,.4)";
      ctx.lineWidth = 1;
      for (let i = -2; i < 8; i++) {
        const lx = x - 26 + i * 8 + trackOffset; // +trackOffset = едем влево
        ctx.beginPath();
        ctx.moveTo(lx, y - 8);
        ctx.lineTo(lx, y);
        ctx.stroke();
      }
      ctx.restore();

      // Корпус
      ctx.fillStyle = cd;
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.rect(x - 24, y - 22, 48, 15);
      ctx.fill();
      ctx.stroke();

      // Передний скос брони — СЛЕВА (цель едет влево)
      ctx.beginPath();
      ctx.moveTo(x - 24, y - 22);
      ctx.lineTo(x - 30, y - 16);
      ctx.lineTo(x - 24, y - 8);
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.6;
      ctx.stroke();

      // Башня (чуть смещена вправо от центра — корма)
      ctx.fillStyle = cd;
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.rect(x - 6, y - 32, 22, 11);
      ctx.fill();
      ctx.stroke();

      // Ствол башни смотрит ВЛЕВО
      ctx.strokeStyle = c;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(x - 6, y - 27);
      ctx.lineTo(x - 26, y - 27);
      ctx.stroke();
      // Дульный тормоз слева
      ctx.beginPath();
      ctx.rect(x - 30, y - 29, 4, 5);
      ctx.fillStyle = c;
      ctx.fill();

      // === КАТКИ — крутятся по часовой (едем влево) ===
      const wheelY = y - 4;
      const wheels = [x - 18, x - 8, x + 2, x + 12, x + 20];
      wheels.forEach((wx_, i) => {
        const r = 4;
        const angle = wheelSpeed + i * 1.2; // по часовой = положительное направление

        ctx.fillStyle = "#061006";
        ctx.strokeStyle = c;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.arc(wx_, wheelY, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.strokeStyle = isSel ? "rgba(61,255,61,.7)" : "rgba(38,179,38,.6)";
        ctx.lineWidth = 0.7;
        for (let s = 0; s < 3; s++) {
          const sa = angle + s * ((Math.PI * 2) / 3);
          ctx.beginPath();
          ctx.moveTo(wx_, wheelY);
          ctx.lineTo(
            wx_ + Math.cos(sa) * r * 0.8,
            wheelY + Math.sin(sa) * r * 0.8,
          );
          ctx.stroke();
        }

        ctx.fillStyle = c;
        ctx.beginPath();
        ctx.arc(wx_, wheelY, 1.2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Ведущее колесо — СПРАВА (задняя часть едущего влево БТР)
      const driveR = 5.5;
      const driveX = x + 22;
      ctx.fillStyle = "#061006";
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(driveX, wheelY, driveR, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.7;
      for (let s = 0; s < 6; s++) {
        const sa = wheelSpeed * 1.2 + s * (Math.PI / 3);
        ctx.beginPath();
        ctx.moveTo(
          driveX + Math.cos(sa) * driveR * 0.6,
          wheelY + Math.sin(sa) * driveR * 0.6,
        );
        ctx.lineTo(
          driveX + Math.cos(sa) * driveR,
          wheelY + Math.sin(sa) * driveR,
        );
        ctx.stroke();
      }
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(driveX, wheelY, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Направляющее колесо — СЛЕВА (перед)
      const idlerX = x - 24;
      ctx.fillStyle = "#061006";
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.arc(idlerX, wheelY, driveR, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.7;
      for (let s = 0; s < 4; s++) {
        const sa = wheelSpeed + s * (Math.PI / 2);
        ctx.beginPath();
        ctx.moveTo(idlerX, wheelY);
        ctx.lineTo(
          idlerX + Math.cos(sa) * driveR * 0.7,
          wheelY + Math.sin(sa) * driveR * 0.7,
        );
        ctx.stroke();
      }
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(idlerX, wheelY, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // === ПЫЛЬ — тянется ВПРАВО (позади едущего влево БТР) ===
      const dustAlpha = 0.15 + Math.sin(now * 7) * 0.05;
      for (let d = 0; d < 4; d++) {
        const dx = x + 30 + d * 6 + Math.sin(now * 5 + d) * 3;
        const dy = y - 1 - d * 2.5;
        const dr = 2.5 + d * 1.2;
        ctx.fillStyle = `rgba(60,90,40,${dustAlpha * (1 - d * 0.2)})`;
        ctx.beginPath();
        ctx.arc(dx, dy, dr, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // ЗРК / КП — башня побольше (без анимации)
      ctx.fillStyle = cd;
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.rect(x - 26, y - 16, 52, 12);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.rect(x - 28, y - 6, 56, 7);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.rect(x - 14, y - 26, 28, 12);
      ctx.fill();
      ctx.stroke();
      // Антенны/пусковые
      ctx.strokeStyle = c;
      ctx.lineWidth = 0.7;
      ctx.beginPath();
      ctx.moveTo(x - 8, y - 26);
      ctx.lineTo(x - 8, y - 38);
      ctx.moveTo(x + 8, y - 26);
      ctx.lineTo(x + 8, y - 38);
      ctx.stroke();
    }
  }

  function drawProjectile(cam) {
    if (!proj || !proj.active) return;
    const px = wx(proj.mx, cam);
    const py = wy(proj.my, cam);

    // Трейл
    if (proj.trail && proj.trail.length > 1) {
      ctx.strokeStyle = "rgba(255,200,50,.25)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      proj.trail.forEach((p, i) => {
        const x = wx(p.mx, cam),
          y = wy(p.my, cam);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
    }

    // Снаряд
    ctx.fillStyle = "rgba(255,200,50,.8)";
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawExplosions(cam) {
    explosions = explosions.filter((e) => e.life > 0);
    explosions.forEach((e) => {
      const px = wx(e.mx, cam),
        py = groundY();
      const p = e.life / e.maxLife;
      const r = (1 - p) * e.maxR;
      // Вспышка
      ctx.fillStyle = `rgba(255,${Math.round(100 + p * 100)},0,${p * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py - r * 0.3, r, 0, Math.PI * 2);
      ctx.fill();
      // Кольцо
      ctx.strokeStyle = `rgba(255,180,50,${p * 0.9})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(px, py, r * 1.1, Math.PI, 0);
      ctx.stroke();
      // Дым
      for (let i = 0; i < 3; i++) {
        const dx = (i - 1) * r * 0.4;
        ctx.fillStyle = `rgba(80,60,20,${p * 0.3})`;
        ctx.beginPath();
        ctx.arc(px + dx, py - r * (0.5 + i * 0.2), r * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
      e.life--;
    });
  }

  function drawHUD(cam) {
    if (!proj || !proj.active) return;
    // Высота и дальность снаряда
    ctx.fillStyle = "rgba(61,255,61,.7)";
    ctx.font = "9px Share Tech Mono";
    ctx.fillText(
      `H: ${Math.round(proj.my)}м  D: ${Math.round((proj.mx / 1000) * 10) / 10}км`,
      W * 0.35,
      14,
    );
  }

  // === Выбор цели ===
  function selectTarget(t) {
    if (firing) return;
    sel = t;
    setPhase("РАСЧЁТ БАЛЛИСТИКИ");
    showBallistic(t);
    renderList();
    draw();
  }

  function showBallistic(t) {
    const d = t.dist;
    const tofv = tof(d),
      ang = ((launchAngle(d) * 180) / Math.PI).toFixed(1);
    const wd = windDrift(d).toFixed(0),
      mh = (maxHeight(d) / 1000).toFixed(1);
    const lead = t.moving ? (t.speed * tofv).toFixed(0) : 0;
    const bp = document.getElementById("bpanel");
    bp.className = "on";
    bp.innerHTML = `
    <div class="brow"><span>Дист.</span><span style="color:var(--green)">${d / 1000} км</span></div>
    <div class="brow"><span>Угол</span><span style="color:var(--amber)">${ang}°</span></div>
    <div class="brow"><span>TOF</span><span style="color:var(--green)">${tofv.toFixed(1)} с</span></div>
    <div class="brow"><span>Макс. H</span><span style="color:var(--green)">${mh} км</span></div>
    <div class="brow"><span>Снос ветра</span><span style="color:var(--amber)">${wd} м ←</span></div>
    ${lead > 0 ? `<div class="brow"><span>Упрежд.</span><span style="color:var(--amber)">${lead} м</span></div>` : ""}
  `;
    document.getElementById("fire-btn").disabled = false;
    log(`[РАСЧЁТ] Угол ${ang}°, TOF ${tofv.toFixed(1)}с, снос ${wd}м`, "i");
    if (t.moving) log(`[РАСЧЁТ] Упреждение по движущейся цели: +${lead}м`, "w");
  }

  // === Выстрел ===
  document.getElementById("fire-btn").addEventListener("click", () => {
    if (!sel || firing || ammo <= 0) return;
    doFire(sel);
  });

  function doFire(t) {
    firing = true;
    ammo--;
    document.getElementById("ammo").textContent = ammo;
    document.getElementById("fire-btn").disabled = true;
    document.getElementById("fire-btn").classList.add("go");
    setSts("ВЫСТРЕЛ", "w");
    setPhase("ВЫСТРЕЛ");
    log(`[ОГОНЬ] Выстрел по ${t.name.split("—")[0]}. Снарядов: ${ammo}`, "w");

    const d = t.dist;
    const tofv = tof(d);
    const ang = launchAngle(d);
    const dt = 1 / 60;
    const totalSteps = Math.ceil(tofv / dt);

    // Начальные скорости
    let vx = MV * Math.cos(ang);
    let vy = MV * Math.sin(ang);
    let mx = 0,
      my = 0;
    let step = 0;

    // Ветровой снос (влево, в нашей схеме это -x в реальных метрах, но визуально не меняем x цели)
    const windAcc = -WIND * 0.01; // небольшое ускорение от ветра

    proj = { active: true, mx: 0, my: 0, trail: [] };

    // Движущаяся цель: обновляем позицию
    const origPx = t.px;

    function step_() {
      step++;
      vy -= G * dt;
      vx += windAcc * dt;
      mx += vx * dt;
      my += vy * dt;
      if (my < 0) my = 0;

      // Движущаяся цель двигается влево
      if (t.moving && !t.hit) {
        t.px -= t.speed * dt;
      }

      proj.mx = mx;
      proj.my = my;
      proj.trail.push({ mx, my });
      if (proj.trail.length > 30) proj.trail.shift();

      draw();

      if (my <= 0 && step > 10) {
        proj.active = false;
        proj.mx = mx;
        proj.my = 0;
        resolveHit(t, mx, d);
      } else {
        requestAnimationFrame(step_);
      }
    }
    requestAnimationFrame(step_);
  }

  function resolveHit(t, landX, dist) {
    // Взрыв в точке приземления
    explosions.push({ mx: landX, maxR: 55, life: 50, maxLife: 50 });

    // КВО зависит от дальности и подвижности
    const cep = t.moving ? 85 : 45;
    const hitP = t.moving ? 0.65 : 0.85;
    const isHit = true;

    // Обновляем пушку через 400мс (взрыв)
    setTimeout(() => {
      if (isHit) {
        t.hit = true;
        const pts = t.moving ? 300 : 200;
        score += pts;
        document.getElementById("pts").textContent = score;
        log(
          `[ПОПАДАНИЕ] ${t.name.split("—")[0]} УНИЧТОЖЕНА! +${pts} очков`,
          "h",
        );
        setSts("ПОПАДАНИЕ", "");
      } else {
        const miss = Math.round(cep * (0.5 + Math.random()));
        t.px = dist; // сброс позиции для следующего выстрела
        log(`[ПРОМАХ] Отклонение ~${miss} м. Повторить огонь.`, "m");
        setSts("ПРОМАХ", "e");
      }

      firing = false;
      sel = null;
      document.getElementById("fire-btn").classList.remove("go");
      document.getElementById("fire-btn").disabled = true;
      document.getElementById("bpanel").className = "";
      setPhase("ВЫБОР ЦЕЛИ");
      renderList();
      draw();

      const alive = targets.filter((x) => !x.hit).length;
      if (alive === 0) setTimeout(showVictory, 700);
      else if (ammo === 0) log("[ВНИМАНИЕ] Боекомплект исчерпан!", "w");
    }, 400);
  }

  function showVictory() {
    document.getElementById("fscore").textContent = score;
    document.getElementById("victory").classList.add("on");
  }

  document.getElementById("rbtn").addEventListener("click", () => {
    initTargets();
    ammo = 6;
    score = 0;
    sel = null;
    firing = false;
    proj = null;
    explosions = [];
    document.getElementById("ammo").textContent = "6";
    document.getElementById("pts").textContent = "0";
    document.getElementById("fire-btn").disabled = true;
    document.getElementById("bpanel").className = "";
    document.getElementById("log").innerHTML = "";
    document.getElementById("victory").classList.remove("on");
    setSts("ГОТОВО", "");
    setPhase("ВЫБОР ЦЕЛИ");
    renderList();
    draw();
    log("[МИССИЯ] Выберите цель. Три объекта для уничтожения.", "i");
  });

  // === UI helpers ===
  function renderList() {
    const list = document.getElementById("tgt-list");
    list.innerHTML = "";
    targets.forEach((t) => {
      const d = document.createElement("div");
      d.className =
        "tcard" +
        (t.hit ? " done" : "") +
        (sel && sel.id === t.id ? " sel" : "");
      d.innerHTML = `<div class="tcard-name">${t.name}</div><div class="tcard-info">${t.brief}</div>`;
      if (!t.hit) d.onclick = () => selectTarget(t);
      list.appendChild(d);
    });
  }
  function setPhase(p) {
    document.getElementById("phase-badge").textContent = p;
  }
  function setSts(v, c) {
    const e = document.getElementById("sts");
    e.textContent = v;
    e.className = "val" + (c ? " " + c : "");
  }
  function log(msg, cls) {
    const l = document.getElementById("log");
    const d = document.createElement("div");
    d.className = "ll " + cls;
    const n = new Date();
    d.textContent = `${String(n.getMinutes()).padStart(2, "0")}:${String(n.getSeconds()).padStart(2, "0")} ${msg}`;
    l.appendChild(d);
    l.scrollTop = l.scrollHeight;
  }

  // Init
  initTargets();
  window.addEventListener("resize", resize);
  resize();
  renderList();
  log("[МИССИЯ] Вид сбоку. Выберите цель — снаряд полетит по параболе.", "i");
  log(
    "[УСЛОВИЯ] Ветер 2 м/с (влево), влажность 70%, реальная баллистика.",
    "i",
  );

  // Постоянный цикл — анимация колёс движущейся цели
  function idleLoop() {
    if (!firing) draw();
    requestAnimationFrame(idleLoop);
  }
  idleLoop();
</script>
